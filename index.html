<title>Futsal Stats</title>
<style>
:root{--bg:#fff;--bg2:#f5f5f4;--bg3:#eeeee9;--text:#1a1a18;--text2:#5f5e5a;--text3:#888780;--border:rgba(0,0,0,0.12);--border2:rgba(0,0,0,0.22);--r:10px;--rl:14px;--green:#1D9E75;--gbg:#E1F5EE;--gdk:#085041;--amber:#BA7517;--abg:#FAEEDA;--adk:#633806;--red:#A32D2D;--rbg:#FCEBEB;--rdk:#501313;--blue:#185FA5;--bbg:#E6F1FB;--bdk:#042C53;--font:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;--mono:'SF Mono','Courier New',monospace;}
@media(prefers-color-scheme:dark){:root{--bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;--text:#f2f2f7;--text2:#aeaeb2;--text3:#636366;--border:rgba(255,255,255,0.12);--border2:rgba(255,255,255,0.22);--gbg:#0a3326;--gdk:#9FE1CB;--abg:#2e1f04;--adk:#FAC775;--rbg:#2d0f0f;--rdk:#F7C1C1;--bbg:#04213d;--bdk:#B5D4F4;}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:var(--font);background:var(--bg3);color:var(--text);min-height:100vh;padding-bottom:calc(20px + env(safe-area-inset-bottom,0px));}
.app{max-width:500px;margin:0 auto;}
.header{background:var(--blue);color:#fff;padding:12px 16px;padding-top:calc(12px + env(safe-area-inset-top,0px));display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.header h1{font-size:17px;font-weight:600;color:#fff;}
.header .sub{font-size:11px;opacity:.8;}
.hbtn{background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:8px;padding:6px 10px;font-size:13px;cursor:pointer;font-family:var(--font);}
.tabs{display:flex;background:var(--bg);border-bottom:.5px solid var(--border);position:sticky;top:calc(52px + env(safe-area-inset-top,0px));z-index:99;}
.tab{flex:1;padding:10px 2px;font-size:11px;text-align:center;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent;border:none;background:none;font-family:var(--font);}
.tab.active{color:var(--blue);border-bottom:2px solid var(--blue);font-weight:600;}
.card{background:var(--bg);border-radius:var(--rl);margin:10px;overflow:hidden;border:.5px solid var(--border);}
.cp{padding:14px 16px;}
.slabel{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin:14px 14px 6px;}
.tcrd{background:var(--blue);color:#fff;border-radius:var(--rl);margin:10px;padding:14px;text-align:center;}
.plbl{font-size:12px;opacity:.8;margin-bottom:3px;}
.tdisp{font-size:60px;font-weight:300;font-family:var(--mono);letter-spacing:2px;color:#fff;line-height:1;}
.tdisp.warn{color:#FAC775;}.tdisp.danger{color:#F09595;}
.srow{display:flex;align-items:center;justify-content:center;gap:14px;margin:10px 0;}
.steam{text-align:center;}
.sname{font-size:12px;opacity:.8;margin-bottom:3px;}
.snum{font-size:44px;font-weight:300;font-family:var(--mono);color:#fff;line-height:1;}
.sadj{display:flex;gap:5px;justify-content:center;margin-top:5px;}
.sbtn{background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:8px;padding:5px 13px;font-size:17px;cursor:pointer;}
.ssep{font-size:36px;opacity:.4;font-weight:300;color:#fff;}
.tbtns{display:flex;gap:7px;justify-content:center;flex-wrap:wrap;margin-top:11px;}
.tbtn{background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:10px;padding:9px 14px;font-size:13px;cursor:pointer;font-family:var(--font);font-weight:500;}
.tbtn.main{background:#fff;color:var(--blue);}
.btn{display:inline-flex;align-items:center;gap:5px;border:.5px solid var(--border2);background:var(--bg);color:var(--text);border-radius:var(--r);padding:9px 13px;font-size:13px;cursor:pointer;font-family:var(--font);}
.btn:active{opacity:.7;transform:scale(.97);}
.btn.bl{background:var(--blue);border-color:var(--blue);color:#fff;}
.btn.gr{background:var(--green);border-color:var(--green);color:#fff;}
.btn.rd{background:var(--red);border-color:var(--red);color:#fff;}
.btn.am{background:var(--amber);border-color:var(--amber);color:#fff;}
.btn.sm{padding:5px 9px;font-size:12px;}
.brow{display:flex;gap:7px;flex-wrap:wrap;padding:0 10px 10px;}
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:7px;padding:0 10px 4px;}
.pcrd{background:var(--bg);border:.5px solid var(--border);border-radius:var(--r);padding:9px 11px;cursor:pointer;}
.pcrd:active{opacity:.75;}
.pcrd.playing{border:1.5px solid var(--green);background:var(--gbg);}
.pcrd.resting{border:1.5px solid var(--amber);background:var(--abg);}
.pcrd.benched{opacity:.7;}
.ptop{display:flex;justify-content:space-between;align-items:flex-start;}
.pname{font-size:14px;font-weight:600;color:var(--text);}
.pdors{font-size:11px;color:var(--text3);}
.pinfo{display:flex;gap:7px;margin-top:4px;font-size:11px;color:var(--text2);flex-wrap:wrap;}
.sdot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:2px;}
.dp{background:var(--green);}.dr{background:var(--amber);}.db{background:var(--text3);}
.cpip{display:inline-block;width:13px;height:17px;border-radius:2px;font-size:10px;font-weight:700;text-align:center;line-height:17px;margin-right:2px;}
.py{background:#FAC775;color:#633806;}.pr{background:#E24B4A;color:#fff;}
.legend{display:flex;gap:10px;padding:0 10px 7px;flex-wrap:wrap;}
.leg{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text2);}
.log{background:var(--bg2);margin:0 10px 10px;border-radius:var(--r);padding:7px 11px;max-height:130px;overflow-y:auto;}
.le{font-size:11px;color:var(--text2);padding:2px 0;border-bottom:.5px solid var(--border);}
.le:last-child{border-bottom:none;}
.lt{font-family:var(--mono);color:var(--text3);margin-right:5px;font-size:10px;}
.stable{width:100%;border-collapse:collapse;font-size:12px;}
.stable th{text-align:left;color:var(--text2);font-weight:600;padding:5px 7px;border-bottom:.5px solid var(--border);font-size:11px;}
.stable td{padding:7px 7px;border-bottom:.5px solid var(--border);color:var(--text);}
.stable tr:last-child td{border-bottom:none;}
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:7px;padding:0 10px 10px;}
.metric{background:var(--bg2);border-radius:var(--r);padding:9px 11px;text-align:center;}
.mlbl{font-size:10px;color:var(--text2);margin-bottom:3px;font-weight:500;}
.mval{font-size:24px;font-weight:300;color:var(--text);font-family:var(--mono);}
.bar-w{display:flex;align-items:center;gap:5px;}
.bar{height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;flex:1;min-width:20px;}
.barf{height:100%;background:var(--green);border-radius:3px;}
.bv{font-size:11px;min-width:32px;color:var(--text2);}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);display:flex;align-items:flex-end;justify-content:center;z-index:200;}
.modal{background:var(--bg);border-radius:20px 20px 0 0;padding:18px 15px calc(18px + env(safe-area-inset-bottom,0px));width:100%;max-width:500px;max-height:88vh;overflow-y:auto;}
.modal h3{font-size:16px;font-weight:600;margin-bottom:12px;text-align:center;color:var(--text);}
.modal label{font-size:12px;color:var(--text2);display:block;margin-bottom:3px;margin-top:9px;font-weight:500;}
.modal select,.modal input[type=text],.modal input[type=number]{width:100%;padding:10px 11px;border-radius:var(--r);border:.5px solid var(--border2);background:var(--bg2);color:var(--text);font-size:16px;font-family:var(--font);-webkit-appearance:none;}
.mbtns{display:flex;gap:7px;margin-top:12px;}
.mbtns .btn{flex:1;justify-content:center;padding:11px;font-size:14px;font-weight:600;}
.mhandle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 12px;}
.rgrid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:5px;margin-bottom:3px;}
.rbtn{border:.5px solid var(--border);background:var(--bg2);color:var(--text);border-radius:var(--r);padding:9px 7px;font-size:12px;cursor:pointer;text-align:center;font-family:var(--font);}
.rbtn.sel{background:var(--bbg);border:1.5px solid var(--blue);color:var(--bdk);font-weight:600;}
.crow{display:flex;align-items:center;justify-content:space-between;padding:11px 15px;border-bottom:.5px solid var(--border);}
.crow:last-child{border-bottom:none;}
.clbl{font-size:14px;color:var(--text);}
.csub{font-size:11px;color:var(--text2);}
.cinput{width:70px;padding:6px 9px;border-radius:var(--r);border:.5px solid var(--border2);background:var(--bg2);color:var(--text);font-size:14px;text-align:center;font-family:var(--font);-webkit-appearance:none;}
.tag{display:inline-flex;align-items:center;gap:4px;background:var(--bg2);border:.5px solid var(--border);border-radius:20px;padding:4px 9px;font-size:12px;color:var(--text);}
.tagd{background:none;border:none;color:var(--text3);font-size:15px;cursor:pointer;padding:0;line-height:1;}
.twrap{display:flex;flex-wrap:wrap;gap:5px;padding:11px 15px;}
/* Historial */
.hcard{background:var(--bg);border:.5px solid var(--border);border-radius:var(--rl);margin:0 10px 10px;overflow:hidden;}
.hcard-head{padding:11px 14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;border-bottom:.5px solid var(--border);}
.hcard-head:active{opacity:.7;}
.hdate{font-size:12px;color:var(--text3);}
.hresult{font-size:18px;font-weight:600;color:var(--text);font-family:var(--mono);}
.hrival{font-size:13px;color:var(--text2);}
.hbody{padding:12px 14px;display:none;}
.hbody.open{display:block;}
.win-badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;}
.win{background:var(--gbg);color:var(--gdk);}
.lose{background:var(--rbg);color:var(--rdk);}
.draw{background:var(--abg);color:var(--adk);}
/* Informe final modal */
.informe{background:var(--bg);border-radius:20px 20px 0 0;padding:20px 16px calc(20px + env(safe-area-inset-bottom,0px));width:100%;max-width:500px;max-height:92vh;overflow-y:auto;}
.informe h2{font-size:20px;font-weight:700;text-align:center;margin-bottom:4px;}
.informe .sub{text-align:center;font-size:13px;color:var(--text2);margin-bottom:16px;}
.inf-score{font-size:48px;font-weight:300;font-family:var(--mono);text-align:center;margin-bottom:4px;}
.inf-result{text-align:center;margin-bottom:16px;}
.inf-section{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin:14px 0 6px;}
.inf-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:.5px solid var(--border);font-size:13px;}
.inf-row:last-child{border-bottom:none;}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="header">
    <div><div id="teamNameDisplay" style="font-size:17px;font-weight:600;color:#fff;">Equipo infantil</div><div class="sub">Futsal Stats</div></div>
    <button class="hbtn" onclick="openEditTeamName()">✏️ Equipo</button>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="showTab('partido')">⚽ Partido</button>
    <button class="tab" onclick="showTab('jugadores')">👥 Jugadores</button>
    <button class="tab" onclick="showTab('stats')">📊 Stats</button>
    <button class="tab" onclick="showTab('historial')">🗂 Historial</button>
    <button class="tab" onclick="showTab('config')">⚙️ Config</button>
  </div>

  <!-- PARTIDO -->
  <div id="tab-partido">
    <div class="tcrd">
      <div class="plbl" id="periodLabel">1ª Parte</div>
      <div class="tdisp" id="timerDisplay">30:00</div>
      <div class="srow">
        <div class="steam">
          <div class="sname" id="homeNameLabel">Nosotros</div>
          <div class="snum" id="homeScore">0</div>
          <div class="sadj">
            <button class="sbtn" onclick="addGoal('home')">+</button>
            <button class="sbtn" onclick="removeGoal('home')">−</button>
          </div>
        </div>
        <div class="ssep">–</div>
        <div class="steam">
          <div class="sname" id="awayNameLabel">Rival</div>
          <div class="snum" id="awayScore">0</div>
          <div class="sadj">
            <button class="sbtn" onclick="addGoal('away')">+</button>
            <button class="sbtn" onclick="removeGoal('away')">−</button>
          </div>
        </div>
      </div>
      <div class="tbtns">
        <button class="tbtn main" id="startStopBtn" onclick="toggleTimer()">▶ Iniciar</button>
        <button class="tbtn" onclick="halfTime()">⏸ Descanso / 2ª</button>
        <button class="tbtn" onclick="resetTimer()">↺ Reset</button>
      </div>
    </div>
    <div class="slabel">Jugadores</div>
    <div class="legend">
      <div class="leg"><span class="sdot dp"></span>Jugando</div>
      <div class="leg"><span class="sdot dr"></span>Descansando</div>
      <div class="leg"><span class="sdot db"></span>Banquillo</div>
    </div>
    <div class="pgrid" id="playersGrid"></div>
    <div class="brow" style="margin-top:6px;">
      <button class="btn bl" onclick="openChangeModal()">🔄 Cambio</button>
      <button class="btn am" onclick="openCardModal('yellow')">🟨 Amarilla</button>
      <button class="btn rd" onclick="openCardModal('red')">🟥 Roja</button>
      <button class="btn" onclick="openAddPlayer()">➕ Jugador</button>
    </div>
    <div class="slabel">Registro</div>
    <div class="log" id="matchLog"><div class="le" style="color:var(--text3);font-style:italic;">El partido aún no ha empezado...</div></div>
    <div class="brow">
      <button class="btn rd" style="flex:1;justify-content:center;" onclick="finalizarPartido()">🏁 Finalizar partido y guardar</button>
    </div>
  </div>

  <!-- JUGADORES -->
  <div id="tab-jugadores" style="display:none;">
    <div class="brow" style="padding-top:10px;">
      <button class="btn bl" onclick="openAddPlayer()">➕ Añadir jugador</button>
      <button class="btn rd" onclick="resetAll()">🗑 Reiniciar</button>
    </div>
    <div class="card"><div id="playersListView"></div></div>
  </div>

  <!-- STATS -->
  <div id="tab-stats" style="display:none;">
    <div class="mgrid" id="metricsView" style="padding-top:10px;"></div>
    <div id="reasonsView"></div>
    <div class="slabel">Tiempo jugado</div>
    <div class="card"><div class="cp"><table class="stable" id="statsTable"></table></div></div>
    <div class="slabel">Registro</div>
    <div class="log" id="statsLog"></div>
  </div>

  <!-- HISTORIAL -->
  <div id="tab-historial" style="display:none;">
    <div class="brow" style="padding-top:10px;">
      <button class="btn rd sm" onclick="borrarHistorial()">🗑 Borrar historial</button>
    </div>
    <div id="historialView"></div>
  </div>

  <!-- CONFIG -->
  <div id="tab-config" style="display:none;">
    <div class="slabel">Partido</div>
    <div class="card">
      <div class="crow">
        <div><div class="clbl">Minutos por parte</div><div class="csub" id="durLabel">30 min actuales</div></div>
        <div style="display:flex;gap:5px;align-items:center;"><input type="number" class="cinput" id="partDuration" value="30" min="5" max="60"><button class="btn bl sm" onclick="applyDuration()">OK</button></div>
      </div>
      <div class="crow">
        <div><div class="clbl">Nombre del rival</div></div>
        <div style="display:flex;gap:5px;align-items:center;"><input type="text" class="cinput" id="awayNameInput" value="Rival" style="width:110px;"><button class="btn bl sm" onclick="applyAwayName()">OK</button></div>
      </div>
    </div>
    <div class="slabel">Motivos de gol</div>
    <div class="card">
      <div class="twrap" id="reasonsList"></div>
      <div class="crow" style="border-top:.5px solid var(--border);">
        <input type="text" id="newReasonInput" placeholder="Nuevo motivo..." style="flex:1;padding:8px 9px;border-radius:var(--r);border:.5px solid var(--border2);background:var(--bg2);color:var(--text);font-size:14px;font-family:var(--font);margin-right:7px;">
        <button class="btn bl sm" onclick="addCustomReason()">Añadir</button>
      </div>
    </div>
  </div>
</div>
<div id="modalContainer"></div>

<script>
const DB_KEY='futsalDB_v1';
const PLAYERS_KEY='futsalPlayers_v1';
const SETTINGS_KEY='futsalSettings_v1';

function loadDB(){try{return JSON.parse(localStorage.getItem(DB_KEY))||[];}catch{return[];}}
function saveDB(db){localStorage.setItem(DB_KEY,JSON.stringify(db));}
function loadSettings(){try{return JSON.parse(localStorage.getItem(SETTINGS_KEY))||{};}catch{return {};}}
function saveSettings(s){localStorage.setItem(SETTINGS_KEY,JSON.stringify(s));}
function loadSavedPlayers(){try{return JSON.parse(localStorage.getItem(PLAYERS_KEY))||null;}catch{return null;}}
function savePlayers(p){localStorage.setItem(PLAYERS_KEY,JSON.stringify(p));}

const cfg=loadSettings();
const PART_MIN=cfg.partMinutes||30;
const TEAM_NAME=cfg.teamName||'Equipo infantil';
const AWAY_NAME=cfg.awayName||'Rival';
const REASONS=cfg.goalReasons||['Propia puerta','2 vs 1','3 vs 2','3 vs 1','Corner','Falta directa','Buena jugada nuestra','Error rival'];

function defaultPlayers(){
  return[
    {id:1,name:'Jugador 1',number:'1',status:'benched',minPlayed:0,goals:0,changes:0,yellowCards:0,redCard:false,lastIn:null},
    {id:2,name:'Jugador 2',number:'2',status:'playing',minPlayed:0,goals:0,changes:0,yellowCards:0,redCard:false,lastIn:0},
    {id:3,name:'Jugador 3',number:'3',status:'playing',minPlayed:0,goals:0,changes:0,yellowCards:0,redCard:false,lastIn:0},
    {id:4,name:'Jugador 4',number:'4',status:'playing',minPlayed:0,goals:0,changes:0,yellowCards:0,redCard:false,lastIn:0},
    {id:5,name:'Jugador 5',number:'5',status:'playing',minPlayed:0,goals:0,changes:0,yellowCards:0,redCard:false,lastIn:0},
    {id:6,name:'Jugador 6',number:'6',status:'playing',minPlayed:0,goals:0,changes:0,yellowCards:0,redCard:false,lastIn:0},
    {id:7,name:'Jugador 7',number:'7',status:'benched',minPlayed:0,goals:0,changes:0,yellowCards:0,redCard:false,lastIn:null},
    {id:8,name:'Jugador 8',number:'8',status:'benched',minPlayed:0,goals:0,changes:0,yellowCards:0,redCard:false,lastIn:null},
  ];
}

let state={
  teamName:TEAM_NAME,awayName:AWAY_NAME,
  players:loadSavedPlayers()||defaultPlayers(),
  homeGoals:0,awayGoals:0,partMinutes:PART_MIN,
  timerSeconds:PART_MIN*60,timerRunning:false,period:1,
  log:[],nextId:9,
  goalReasons:[...REASONS],goalStats:{},
  matchDate:new Date().toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit',year:'numeric'})
};

let timerInterval=null,currentTab='partido',pendingGoalReason=null;

document.getElementById('teamNameDisplay').textContent=state.teamName;
document.getElementById('homeNameLabel').textContent=state.teamName;
document.getElementById('awayNameLabel').textContent=state.awayName;

function elapsed(){return state.partMinutes*60-state.timerSeconds;}
function elapsedStr(){const e=elapsed();return String(Math.floor(e/60)).padStart(2,'0')+':'+String(e%60).padStart(2,'0');}

function toggleTimer(){
  if(state.timerRunning){clearInterval(timerInterval);state.timerRunning=false;addLog('⏸ Tiempo detenido');}
  else{
    if(state.timerSeconds<=0)return;
    state.timerRunning=true;addLog('▶ Partido en curso'+(state.period===2?' — 2ª parte':''));
    timerInterval=setInterval(()=>{
      if(state.timerSeconds>0){state.timerSeconds--;updateTimerDisplay();state.players.forEach(p=>{if(p.status==='playing')p.minPlayed++;});}
      else{clearInterval(timerInterval);state.timerRunning=false;addLog('⏰ Fin de '+(state.period===1?'1ª parte':'2ª parte'));renderPlayers();}
    },1000);
  }
  renderTimerBtn();
}

function halfTime(){
  if(state.timerRunning){clearInterval(timerInterval);state.timerRunning=false;}
  if(state.period===1){state.period=2;state.timerSeconds=state.partMinutes*60;document.getElementById('periodLabel').textContent='2ª Parte';addLog('🔔 Descanso — empieza 2ª parte');}
  else{addLog('🏁 Fin del partido');}
  renderTimerBtn();updateTimerDisplay();
}

function resetTimer(){
  clearInterval(timerInterval);state.timerRunning=false;state.timerSeconds=state.partMinutes*60;state.period=1;
  document.getElementById('periodLabel').textContent='1ª Parte';renderTimerBtn();updateTimerDisplay();
}

function updateTimerDisplay(){
  const m=Math.floor(state.timerSeconds/60),s=state.timerSeconds%60;
  const el=document.getElementById('timerDisplay');
  el.textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
  el.className='tdisp'+(state.timerSeconds<=300&&state.timerSeconds>60?' warn':state.timerSeconds<=60?' danger':'');
}

function renderTimerBtn(){
  const b=document.getElementById('startStopBtn');
  b.textContent=state.timerRunning?'⏸ Pausar':'▶ Iniciar';
  b.className=state.timerRunning?'tbtn':'tbtn main';
}

function addGoal(team){
  if(team==='home'){state.homeGoals++;document.getElementById('homeScore').textContent=state.homeGoals;openGoalModal();}
  else{state.awayGoals++;document.getElementById('awayScore').textContent=state.awayGoals;openAwayGoalModal();}
}
function removeGoal(team){
  if(team==='home'&&state.homeGoals>0){state.homeGoals--;document.getElementById('homeScore').textContent=state.homeGoals;addLog('✏️ Corrección gol nuestro');}
  else if(team==='away'&&state.awayGoals>0){state.awayGoals--;document.getElementById('awayScore').textContent=state.awayGoals;addLog('✏️ Corrección gol rival');}
}

function openGoalModal(){
  pendingGoalReason=null;
  const playing=state.players.filter(p=>p.status==='playing');
  const opts='<option value="0">Sin especificar</option>'+playing.map(p=>`<option value="${p.id}">${p.name} (#${p.number})</option>`).join('');
  showModal(`<div class="mhandle"></div><h3>⚽ Gol nuestro — ${elapsedStr()}</h3>
    <label>Goleador</label><select id="scorerSel">${opts}</select>
    <label>Motivo</label><div class="rgrid">${state.goalReasons.map((r,i)=>`<button class="rbtn" onclick="selR(${i},this)">${r}</button>`).join('')}</div>
    <div class="mbtns"><button class="btn" onclick="closeModal()">Cancelar</button><button class="btn gr" onclick="confirmGoal()">✓ Confirmar</button></div>`);
}

function openAwayGoalModal(){
  pendingGoalReason=null;
  showModal(`<div class="mhandle"></div><h3 style="color:var(--red);">⚽ Gol del rival — ${elapsedStr()}</h3>
    <label>Motivo</label><div class="rgrid">${state.goalReasons.map((r,i)=>`<button class="rbtn" onclick="selR(${i},this)">${r}</button>`).join('')}</div>
    <div class="mbtns"><button class="btn" onclick="closeModal()">Cancelar</button><button class="btn rd" onclick="confirmAwayGoal()">✓ Confirmar</button></div>`);
}

function selR(i,el){pendingGoalReason=i;document.querySelectorAll('.rbtn').forEach(b=>b.classList.remove('sel'));el.classList.add('sel');}

function confirmGoal(){
  const id=parseInt(document.getElementById('scorerSel').value);
  const p=id>0?state.players.find(x=>x.id===id):null;
  const r=pendingGoalReason!==null?state.goalReasons[pendingGoalReason]:null;
  if(p)p.goals++;
  if(r)state.goalStats[r]=(state.goalStats[r]||0)+1;
  addLog('⚽ Gol nuestro'+(p?` — ${p.name}`:'')+(r?` [${r}]`:'')+' — '+elapsedStr());
  closeModal();renderPlayers();
}

function confirmAwayGoal(){
  const r=pendingGoalReason!==null?state.goalReasons[pendingGoalReason]:null;
  if(r)state.goalStats['rival_'+r]=(state.goalStats['rival_'+r]||0)+1;
  addLog('⚽ Gol rival'+(r?` [${r}]`:'')+' — '+elapsedStr());
  closeModal();
}

function openCardModal(type){
  const opts=state.players.map(p=>`<option value="${p.id}">${p.name} (#${p.number})</option>`).join('');
  showModal(`<div class="mhandle"></div><h3>${type==='yellow'?'🟨 Tarjeta amarilla':'🟥 Tarjeta roja'}</h3>
    <label>Jugador</label><select id="cardPlayerSel">${opts}</select>
    <div class="mbtns"><button class="btn" onclick="closeModal()">Cancelar</button><button class="btn ${type==='yellow'?'am':'rd'}" onclick="confirmCard('${type}')">✓ Confirmar</button></div>`);
}

function confirmCard(type){
  const p=state.players.find(x=>x.id===parseInt(document.getElementById('cardPlayerSel').value));
  if(!p){closeModal();return;}
  if(type==='yellow'){p.yellowCards++;addLog(`🟨 Amarilla a ${p.name} — ${elapsedStr()}`);if(p.yellowCards>=2){p.redCard=true;p.status='benched';addLog(`🟥 ${p.name} expulsado (2ª amarilla)`);}}
  else{p.redCard=true;p.status='benched';addLog(`🟥 Roja a ${p.name} — EXPULSADO — ${elapsedStr()}`);}
  closeModal();renderPlayers();
}

function openChangeModal(){
  const playing=state.players.filter(p=>p.status==='playing');
  const bench=state.players.filter(p=>(p.status==='benched'||p.status==='resting')&&!p.redCard);
  if(!playing.length||!bench.length){alert('No hay suficientes jugadores.');return;}
  showModal(`<div class="mhandle"></div><h3>🔄 Hacer cambio</h3>
    <label>Sale del campo</label><select id="outSel">${playing.map(p=>`<option value="${p.id}">${p.name} (#${p.number})</option>`).join('')}</select>
    <label>Entra al campo</label><select id="inSel">${bench.map(p=>`<option value="${p.id}">${p.name} (#${p.number}) [${p.status==='resting'?'descansando':'banquillo'}]</option>`).join('')}</select>
    <div class="mbtns"><button class="btn" onclick="closeModal()">Cancelar</button><button class="btn bl" onclick="confirmChange()">✓ Confirmar</button></div>`);
}

function confirmChange(){
  const pO=state.players.find(x=>x.id===parseInt(document.getElementById('outSel').value));
  const pI=state.players.find(x=>x.id===parseInt(document.getElementById('inSel').value));
  if(pO&&pI){pO.status='resting';pI.status='playing';pI.lastIn=elapsed();pO.changes++;pI.changes++;addLog(`🔄 Entra ${pI.name}, sale ${pO.name} — ${elapsedStr()}`);}
  closeModal();renderPlayers();
}

function openAddPlayer(){
  showModal(`<div class="mhandle"></div><h3>➕ Nuevo jugador</h3>
    <label>Nombre</label><input type="text" id="newName" placeholder="Nombre">
    <label>Dorsal</label><input type="number" id="newNum" placeholder="Dorsal" min="1" max="99">
    <label>Estado</label><select id="newStatus"><option value="benched">Banquillo</option><option value="playing">Jugando</option></select>
    <div class="mbtns"><button class="btn" onclick="closeModal()">Cancelar</button><button class="btn bl" onclick="confirmAddPlayer()">✓ Añadir</button></div>`);
}

function confirmAddPlayer(){
  const name=document.getElementById('newName').value.trim();
  const num=document.getElementById('newNum').value.trim();
  const status=document.getElementById('newStatus').value;
  if(!name){alert('Escribe el nombre.');return;}
  state.players.push({id:state.nextId++,name,number:num||'?',status,minPlayed:0,goals:0,changes:0,yellowCards:0,redCard:false,lastIn:status==='playing'?0:null});
  addLog(`➕ ${name} añadido`);closeModal();renderPlayers();
  savePlayers(state.players.map(p=>({id:p.id,name:p.name,number:p.number})));
  if(currentTab==='jugadores')renderPlayersList();
}

function openEditTeamName(){
  showModal(`<div class="mhandle"></div><h3>✏️ Nombre del equipo</h3>
    <label>Nombre</label><input type="text" id="teamNameInput" value="${state.teamName}">
    <div class="mbtns"><button class="btn" onclick="closeModal()">Cancelar</button><button class="btn bl" onclick="confirmTeamName()">✓ Guardar</button></div>`);
}

function confirmTeamName(){
  const v=document.getElementById('teamNameInput').value.trim();
  if(v){state.teamName=v;document.getElementById('teamNameDisplay').textContent=v;document.getElementById('homeNameLabel').textContent=v;
    const s=loadSettings();s.teamName=v;saveSettings(s);}
  closeModal();
}

function applyDuration(){
  const v=parseInt(document.getElementById('partDuration').value);
  if(v>=5&&v<=60){
    state.partMinutes=v;state.timerSeconds=v*60;
    clearInterval(timerInterval);state.timerRunning=false;state.period=1;
    document.getElementById('periodLabel').textContent='1ª Parte';
    document.getElementById('durLabel').textContent=`${v} min actuales`;
    renderTimerBtn();updateTimerDisplay();
    const s=loadSettings();s.partMinutes=v;saveSettings(s);
    addLog(`⚙️ Duración: ${v} min por parte`);
  }
}

function applyAwayName(){
  const v=document.getElementById('awayNameInput').value.trim();
  if(v){state.awayName=v;document.getElementById('awayNameLabel').textContent=v;const s=loadSettings();s.awayName=v;saveSettings(s);}
}

function addCustomReason(){
  const inp=document.getElementById('newReasonInput');
  const v=inp.value.trim();
  if(v&&!state.goalReasons.includes(v)){state.goalReasons.push(v);inp.value='';renderReasonsList();const s=loadSettings();s.goalReasons=state.goalReasons;saveSettings(s);}
}

function removeReason(i){state.goalReasons.splice(i,1);renderReasonsList();const s=loadSettings();s.goalReasons=state.goalReasons;saveSettings(s);}

function renderReasonsList(){
  const el=document.getElementById('reasonsList');
  if(!el)return;
  el.innerHTML=state.goalReasons.map((r,i)=>`<span class="tag">${r}<button class="tagd" onclick="removeReason(${i})">×</button></span>`).join('');
}

// ===================== FINALIZAR PARTIDO =====================
function finalizarPartido(){
  if(!confirm('¿Finalizar el partido y guardar el informe?'))return;
  if(state.timerRunning){clearInterval(timerInterval);state.timerRunning=false;}

  const db=loadDB();
  const resultado=state.homeGoals>state.awayGoals?'victoria':state.homeGoals<state.awayGoals?'derrota':'empate';
  const informe={
    id:Date.now(),
    fecha:new Date().toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}),
    rival:state.awayName,
    golesNuestros:state.homeGoals,
    golesRival:state.awayGoals,
    resultado,
    partMinutes:state.partMinutes,
    jugadores:state.players.map(p=>({
      id:p.id,name:p.name,number:p.number,
      minPlayed:p.minPlayed,goals:p.goals,changes:p.changes,
      yellowCards:p.yellowCards,redCard:p.redCard
    })),
    goalStats:{...state.goalStats},
    log:[...state.log],
    goleadores:state.players.filter(p=>p.goals>0).sort((a,b)=>b.goals-a.goals).map(p=>p.name+' ('+p.goals+')')
  };
  db.unshift(informe);
  saveDB(db);

  mostrarInforme(informe,true);
}

function mostrarInforme(inf,esNuevo){
  const resultado=inf.resultado;
  const badge=resultado==='victoria'?'<span class="win-badge win">VICTORIA</span>':resultado==='derrota'?'<span class="win-badge lose">DERROTA</span>':'<span class="win-badge draw">EMPATE</span>';
  const goleadores=inf.goleadores&&inf.goleadores.length?inf.goleadores.join(', '):'Ninguno';
  const ourStats=inf.goalStats?Object.entries(inf.goalStats).filter(([k])=>!k.startsWith('rival_')).map(([k,v])=>`${k}: ${v}`).join(' · '):'—';
  const awayStats=inf.goalStats?Object.entries(inf.goalStats).filter(([k])=>k.startsWith('rival_')).map(([k,v])=>`${k.replace('rival_','')}: ${v}`).join(' · '):'—';
  const sorted=[...inf.jugadores].sort((a,b)=>b.minPlayed-a.minPlayed);

  const d=document.createElement('div');
  d.className='modal-overlay';d.id='modalOverlay';
  d.innerHTML=`<div class="informe">
    <div class="mhandle"></div>
    <h2>🏁 Informe del partido</h2>
    <div class="sub">${inf.fecha} · vs ${inf.rival}</div>
    <div class="inf-score">${inf.golesNuestros} – ${inf.golesRival}</div>
    <div class="inf-result">${badge}</div>
    <div class="inf-section">Goleadores</div>
    <div style="font-size:14px;color:var(--text);margin-bottom:4px;">${goleadores}</div>
    <div class="inf-section">Motivos goles nuestros</div>
    <div style="font-size:13px;color:var(--text2);margin-bottom:4px;">${ourStats||'—'}</div>
    <div class="inf-section">Motivos goles rivales</div>
    <div style="font-size:13px;color:var(--text2);margin-bottom:8px;">${awayStats||'—'}</div>
    <div class="inf-section">Tiempo jugado por jugador</div>
    <table class="stable">
      <thead><tr><th>Jugador</th><th>#</th><th>Minutos</th><th>⚽</th><th>Tarj.</th></tr></thead>
      <tbody>${sorted.map(p=>{
        const m=Math.floor(p.minPlayed/60),s=p.minPlayed%60;
        const cards=(p.yellowCards?`<span class="cpip py">${p.yellowCards}</span>`:'')+( p.redCard?'<span class="cpip pr">R</span>':'');
        return `<tr><td>${p.name}</td><td>${p.number}</td><td>${m}:${String(s).padStart(2,'0')}</td><td>${p.goals}</td><td>${cards||'—'}</td></tr>`;
      }).join('')}</tbody>
    </table>
    <div class="inf-section">Registro</div>
    <div class="log" style="max-height:120px;">${inf.log.slice(0,30).map(e=>`<div class="le"><span class="lt">${e.time}</span>${e.msg}</div>`).join('')}</div>
    <div class="mbtns" style="margin-top:14px;">
      ${esNuevo?`<button class="btn rd" onclick="closeModal()">Cerrar</button><button class="btn bl" onclick="cerrarYReiniciar()">🔄 Nuevo partido</button>`:`<button class="btn bl" onclick="closeModal()">Cerrar</button>`}
    </div>
  </div>`;
  document.body.appendChild(d);
}

function cerrarYReiniciar(){
  closeModal();
  const savedNames=state.players.map(p=>({id:p.id,name:p.name,number:p.number}));
  savePlayers(savedNames);
  const mins=state.partMinutes;const tn=state.teamName;const an=state.awayName;const gr=[...state.goalReasons];
  state={
    teamName:tn,awayName:an,
    players:savedNames.map((p,i)=>({...p,status:i<5?'playing':'benched',minPlayed:0,goals:0,changes:0,yellowCards:0,redCard:false,lastIn:i<5?0:null})),
    homeGoals:0,awayGoals:0,partMinutes:mins,timerSeconds:mins*60,timerRunning:false,period:1,
    log:[],nextId:savedNames.length+1,goalReasons:gr,goalStats:{},
    matchDate:new Date().toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit',year:'numeric'})
  };
  document.getElementById('homeScore').textContent='0';
  document.getElementById('awayScore').textContent='0';
  document.getElementById('periodLabel').textContent='1ª Parte';
  document.getElementById('matchLog').innerHTML='<div class="le" style="color:var(--text3);font-style:italic;">El partido aún no ha empezado...</div>';
  updateTimerDisplay();renderTimerBtn();renderPlayers();
  showTab('partido');
}

function resetAll(){
  if(!confirm('¿Reiniciar todo?'))return;
  clearInterval(timerInterval);
  localStorage.removeItem(PLAYERS_KEY);
  const mins=state.partMinutes;const tn=state.teamName;const an=state.awayName;const gr=[...state.goalReasons];
  state={teamName:tn,awayName:an,players:defaultPlayers(),homeGoals:0,awayGoals:0,partMinutes:mins,timerSeconds:mins*60,timerRunning:false,period:1,log:[],nextId:9,goalReasons:gr,goalStats:{}};
  document.getElementById('homeScore').textContent='0';document.getElementById('awayScore').textContent='0';
  document.getElementById('periodLabel').textContent='1ª Parte';
  document.getElementById('matchLog').innerHTML='<div class="le" style="color:var(--text3);font-style:italic;">El partido aún no ha empezado...</div>';
  updateTimerDisplay();renderTimerBtn();renderPlayers();renderPlayersList();
}

function borrarHistorial(){
  if(!confirm('¿Borrar todo el historial de partidos?'))return;
  saveDB([]);renderHistorial();
}

function addLog(msg){
  state.log.unshift({time:elapsedStr(),msg});
  const el=document.getElementById('matchLog');
  if(el)el.innerHTML=state.log.map(e=>`<div class="le"><span class="lt">${e.time}</span>${e.msg}</div>`).join('');
}

function statusLabel(s){return s==='playing'?'Jugando':s==='resting'?'Descansando':'Banquillo';}

function renderPlayers(){
  const g=document.getElementById('playersGrid');if(!g)return;
  g.innerHTML=state.players.map(p=>{
    const m=Math.floor(p.minPlayed/60);
    const cards=(p.yellowCards?`<span class="cpip py">${p.yellowCards}</span>`:'')+( p.redCard?'<span class="cpip pr">R</span>':'');
    return `<div class="pcrd ${p.status}" onclick="cycleStatus(${p.id})">
      <div class="ptop"><span class="pname">${p.name}</span><span class="pdors">#${p.number}</span></div>
      <div class="pinfo"><span><span class="sdot d${p.status[0]}"></span>${statusLabel(p.status)}</span><span>⏱${m}min</span>${p.goals>0?`<span>⚽${p.goals}</span>`:''}</div>
      ${cards?`<div style="margin-top:3px;">${cards}${p.redCard?'<span style="font-size:10px;color:var(--red);"> EXP</span>':''}</div>`:''}
    </div>`;
  }).join('');
}

function cycleStatus(id){
  const p=state.players.find(x=>x.id===id);if(!p||p.redCard)return;
  const c=['playing','resting','benched'];
  p.status=c[(c.indexOf(p.status)+1)%3];
  if(p.status==='playing'){p.lastIn=elapsed();addLog(`🔄 ${p.name} entra — ${elapsedStr()}`);}
  else if(p.status==='resting')addLog(`🔄 ${p.name} descansa — ${elapsedStr()}`);
  else addLog(`🔄 ${p.name} al banquillo — ${elapsedStr()}`);
  renderPlayers();
}

function renderPlayersList(){
  const el=document.getElementById('playersListView');if(!el)return;
  el.innerHTML=state.players.map(p=>`
    <div class="crow"><div>
      <div class="clbl">${p.name} <span style="color:var(--text3);font-size:12px;">#${p.number}</span>${p.redCard?'<span style="color:var(--red);font-size:11px;"> EXP</span>':''}</div>
      <div class="csub">${statusLabel(p.status)} · ${Math.floor(p.minPlayed/60)}min · ${p.goals} goles</div>
    </div><button class="btn rd sm" onclick="removePlayer(${p.id})">🗑</button></div>`).join('');
}

function removePlayer(id){
  const p=state.players.find(x=>x.id===id);
  if(!p||!confirm(`¿Eliminar a ${p.name}?`))return;
  state.players=state.players.filter(x=>x.id!==id);addLog(`➖ ${p.name} eliminado`);renderPlayersList();renderPlayers();
}

function renderStats(){
  const totalY=state.players.reduce((a,p)=>a+p.yellowCards,0);
  const totalR=state.players.filter(p=>p.redCard).length;
  document.getElementById('metricsView').innerHTML=`
    <div class="metric"><div class="mlbl">Marcador</div><div class="mval" style="font-size:20px;">${state.homeGoals}–${state.awayGoals}</div></div>
    <div class="metric"><div class="mlbl">Parte</div><div class="mval">${state.period}ª</div></div>
    <div class="metric"><div class="mlbl">Amarillas</div><div class="mval" style="color:var(--amber);">${totalY}</div></div>
    <div class="metric"><div class="mlbl">Rojas</div><div class="mval" style="color:var(--red);">${totalR}</div></div>`;
  const ourR=state.goalReasons.filter(r=>state.goalStats[r]>0);
  const awayR=state.goalReasons.filter(r=>state.goalStats['rival_'+r]>0);
  let rv='';
  if(ourR.length)rv+=`<div class="slabel">Motivos goles nuestros</div><div style="display:flex;flex-wrap:wrap;gap:5px;padding:0 10px 8px;">${ourR.map(r=>`<span style="background:var(--gbg);color:var(--gdk);border-radius:20px;padding:4px 10px;font-size:12px;font-weight:600;">${r}: ${state.goalStats[r]}</span>`).join('')}</div>`;
  if(awayR.length)rv+=`<div class="slabel">Motivos goles rivales</div><div style="display:flex;flex-wrap:wrap;gap:5px;padding:0 10px 8px;">${awayR.map(r=>`<span style="background:var(--rbg);color:var(--rdk);border-radius:20px;padding:4px 10px;font-size:12px;font-weight:600;">${r}: ${state.goalStats['rival_'+r]}</span>`).join('')}</div>`;
  document.getElementById('reasonsView').innerHTML=rv;
  const sorted=[...state.players].sort((a,b)=>b.minPlayed-a.minPlayed);
  const maxT=state.partMinutes*120;
  document.getElementById('statsTable').innerHTML=`<thead><tr><th>Jugador</th><th>Tiempo</th><th>⚽</th><th>Tarj.</th></tr></thead><tbody>${sorted.map(p=>{
    const m=Math.floor(p.minPlayed/60),s=p.minPlayed%60;
    const pct=Math.min(Math.round(p.minPlayed/maxT*100),100);
    const cards=(p.yellowCards?`<span class="cpip py">${p.yellowCards}</span>`:'')+( p.redCard?'<span class="cpip pr">R</span>':'');
    return `<tr><td>${p.name}<br><span style="font-size:10px;color:var(--text3);">#${p.number}</span></td><td><div class="bar-w"><div class="bar"><div class="barf" style="width:${pct}%"></div></div><span class="bv">${m}:${String(s).padStart(2,'0')}</span></div></td><td>${p.goals}</td><td>${cards||'—'}</td></tr>`;
  }).join('')}</tbody>`;
  document.getElementById('statsLog').innerHTML=state.log.length?state.log.map(e=>`<div class="le"><span class="lt">${e.time}</span>${e.msg}</div>`).join(''):'<div class="le" style="color:var(--text3);font-style:italic;">Sin eventos aún</div>';
}

function renderHistorial(){
  const db=loadDB();
  const el=document.getElementById('historialView');if(!el)return;
  if(!db.length){el.innerHTML='<div style="padding:24px;text-align:center;color:var(--text3);font-size:14px;">No hay partidos guardados aún.</div>';return;}

  const totalV=db.filter(p=>p.resultado==='victoria').length;
  const totalD=db.filter(p=>p.resultado==='derrota').length;
  const totalE=db.filter(p=>p.resultado==='empate').length;
  const gf=db.reduce((a,p)=>a+p.golesNuestros,0);
  const gc=db.reduce((a,p)=>a+p.golesRival,0);

  el.innerHTML=`
    <div class="mgrid" style="padding-top:10px;">
      <div class="metric"><div class="mlbl">Victorias</div><div class="mval" style="color:var(--green);">${totalV}</div></div>
      <div class="metric"><div class="mlbl">Derrotas</div><div class="mval" style="color:var(--red);">${totalD}</div></div>
      <div class="metric"><div class="mlbl">Empates</div><div class="mval" style="color:var(--amber);">${totalE}</div></div>
      <div class="metric"><div class="mlbl">Goles F/C</div><div class="mval" style="font-size:18px;">${gf}/${gc}</div></div>
    </div>
    <div class="slabel">Partidos</div>
    ${db.map((inf,idx)=>{
      const badge=inf.resultado==='victoria'?'<span class="win-badge win">V</span>':inf.resultado==='derrota'?'<span class="win-badge lose">D</span>':'<span class="win-badge draw">E</span>';
      return `<div class="hcard">
        <div class="hcard-head" onclick="toggleHCard(${idx})">
          <div><div style="font-size:15px;font-weight:600;">vs ${inf.rival} ${badge}</div><div class="hdate">${inf.fecha}</div></div>
          <div class="hresult">${inf.golesNuestros}–${inf.golesRival}</div>
        </div>
        <div class="hbody" id="hbody_${idx}">
          <div style="font-size:12px;color:var(--text2);margin-bottom:8px;">⚽ Goleadores: ${inf.goleadores&&inf.goleadores.length?inf.goleadores.join(', '):'Ninguno'}</div>
          <table class="stable">
            <thead><tr><th>Jugador</th><th>Min</th><th>⚽</th><th>Tarj.</th></tr></thead>
            <tbody>${[...inf.jugadores].sort((a,b)=>b.minPlayed-a.minPlayed).map(p=>{
              const m=Math.floor(p.minPlayed/60),s=p.minPlayed%60;
              const cards=(p.yellowCards?`<span class="cpip py">${p.yellowCards}</span>`:'')+( p.redCard?'<span class="cpip pr">R</span>':'');
              return `<tr><td>${p.name} <span style="color:var(--text3);font-size:10px;">#${p.number}</span></td><td>${m}:${String(s).padStart(2,'0')}</td><td>${p.goals}</td><td>${cards||'—'}</td></tr>`;
            }).join('')}</tbody>
          </table>
          <button class="btn rd sm" style="margin-top:10px;" onclick="borrarPartido(${inf.id})">🗑 Borrar este partido</button>
        </div>
      </div>`;
    }).join('')}`;
}

function toggleHCard(idx){
  const el=document.getElementById('hbody_'+idx);
  if(el)el.classList.toggle('open');
}

function borrarPartido(id){
  if(!confirm('¿Borrar este partido?'))return;
  const db=loadDB().filter(p=>p.id!==id);saveDB(db);renderHistorial();
}

function showTab(tab){
  currentTab=tab;
  ['partido','jugadores','stats','historial','config'].forEach((t,i)=>{
    document.querySelectorAll('.tab')[i].classList.toggle('active',t===tab);
    document.getElementById('tab-'+t).style.display=t===tab?'':'none';
  });
  if(tab==='jugadores')renderPlayersList();
  if(tab==='stats')renderStats();
  if(tab==='historial')renderHistorial();
  if(tab==='config'){renderReasonsList();document.getElementById('partDuration').value=state.partMinutes;document.getElementById('durLabel').textContent=state.partMinutes+' min actuales';document.getElementById('awayNameInput').value=state.awayName;}
}

function showModal(html){
  const d=document.createElement('div');d.className='modal-overlay';d.id='modalOverlay';
  d.innerHTML=`<div class="modal">${html}</div>`;
  d.addEventListener('click',e=>{if(e.target===d)closeModal();});
  document.body.appendChild(d);
}
function closeModal(){const el=document.getElementById('modalOverlay');if(el)el.remove();}

renderPlayers();updateTimerDisplay();
</script>
</body>
</html>
